<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON / Python Dict 查看器</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="app-shell">
    <section class="viewer card">
      <div class="viewer-column">
        <div class="panel-head actions-right">
          <div class="toolbar">
            <button id="clearBtn">清除</button>
            <button id="collapseAllBtn" class="secondary">全部收起</button>
          </div>
        </div>
        <textarea id="inputBox" spellcheck="false" placeholder="粘贴 JSON、Python 字典，或转义后的文本"></textarea>
        <div id="statusBar" class="status muted">等待粘贴内容</div>
      </div>

      <div class="viewer-column">
        <div id="treeView" class="tree-view empty">粘贴后会自动解析并显示在这里</div>
      </div>
    </section>
  </main>

  <div id="contextMenu" class="context-menu hidden">
    <button id="contextUnescapeBtn" class="context-menu-btn">处理选中文本</button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
