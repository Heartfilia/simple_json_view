<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>只做JSON格式化</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="app-shell">
    <section class="viewer card">
      <div class="viewer-column">
        <div class="panel-head panel-head-split">
          <div id="statusBar" class="status muted status-inline">等待粘贴内容</div>
          <div class="toolbar">
            <button id="processInputBtn" class="ghost hidden-action">处理输入内容</button>
            <button id="themeToggleBtn" class="ghost">夜晚模式</button>
            <button id="clearBtn">清除</button>
            <button id="collapseAllBtn" class="secondary">全部收起</button>
          </div>
        </div>
        <textarea id="inputBox" spellcheck="false" placeholder="粘贴 JSON、Python 字典，或转义后的文本"></textarea>
      </div>

      <div class="viewer-column">
        <div id="treePanel" class="result-panel">
          <div class="panel-head actions-right result-panel-head">
            <div class="toolbar">
              <input id="treeSearchInput" class="toolbar-input" type="text" placeholder="搜索 key / value" />
              <button id="searchPrevBtn" class="ghost">上一个</button>
              <button id="searchNextBtn" class="ghost">下一个</button>
              <button id="copyValueBtn" class="ghost">复制值</button>
              <button id="copyNodeBtn" class="ghost">复制节点</button>
              <button id="fullscreenBtn" class="ghost">全屏查看</button>
              <button id="fullscreenCloseBtn" class="ghost fullscreen-close-btn">退出全屏</button>
            </div>
          </div>
          <div id="treeView" class="tree-view empty">粘贴后会自动解析并显示在这里</div>
        </div>
      </div>
    </section>
  </main>

  <div id="fullscreenBackdrop" class="fullscreen-backdrop"></div>
  <div id="fullscreenHost" class="fullscreen-host"></div>
  <div id="contextMenu" class="context-menu hidden">
    <button id="contextCopyPathBtn" class="context-menu-btn">复制路径</button>
    <button id="contextCopyValueBtn" class="context-menu-btn">复制值</button>
    <button id="contextCopyNodeBtn" class="context-menu-btn">复制节点</button>
    <button id="contextUnescapeBtn" class="context-menu-btn">处理输入内容</button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
