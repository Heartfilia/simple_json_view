<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="author" content="Heartfilia">
  <meta name="copyright" content="Copyright 2026 Heartfilia">
  <meta name="license" content="Apache-2.0">
  <meta name="description" content="只做一件事，那就是 干净，好用，易用">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>只做JSON格式化</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="apple-touch-icon" href="./favicon.svg" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="app-shell">
    <section class="viewer card">
      <div class="viewer-column">
        <div class="panel-head panel-head-split">
          <div id="statusBar" class="status muted status-inline">等待粘贴内容</div>
          <div class="toolbar primary-toolbar">
            <button id="processInputBtn" class="ghost toolbar-action-btn hidden-action">处理输入内容</button>
            <button id="themeToggleBtn" class="ghost theme-toggle-btn" type="button" aria-label="Switch to dark mode" title="Switch to dark mode">
              <span class="theme-toggle-icon" aria-hidden="true">
                <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" focusable="false">
                  <path d="M20.2 14.1A8.6 8.6 0 1 1 9.9 3.8a7.2 7.2 0 1 0 10.3 10.3Z" />
                </svg>
              </span>
            </button>
            <button id="compactBtn" class="ghost toolbar-action-btn">压缩</button>
            <button id="clearBtn" class="ghost toolbar-action-btn">清除</button>
            <button id="expandAllBtn" class="ghost toolbar-action-btn">展开</button>
            <button id="collapseAllBtn" class="ghost toolbar-action-btn">收起</button>
          </div>
        </div>
        <textarea id="inputBox" spellcheck="false" placeholder="粘贴 JSON、Python 字典，或转义后的文本"></textarea>
      </div>

      <div class="viewer-column">
        <div id="treePanel" class="result-panel">
          <div class="panel-head actions-right result-panel-head">
            <div class="toolbar result-toolbar">
              <div class="search-field">
                <input id="treeSearchInput" class="toolbar-input search-field-input" type="text" placeholder="搜索" />
                <div class="search-nav" aria-label="搜索结果导航">
                  <span id="searchResultCount" class="search-result-count" aria-live="polite"></span>
                  <button id="searchPrevBtn" class="search-nav-btn" type="button" aria-label="上一个结果" title="上一个结果">
                    <svg viewBox="0 0 20 20" aria-hidden="true">
                      <path d="M11.75 4.5L6.25 10l5.5 5.5" />
                    </svg>
                  </button>
                  <button id="searchNextBtn" class="search-nav-btn" type="button" aria-label="下一个结果" title="下一个结果">
                    <svg viewBox="0 0 20 20" aria-hidden="true">
                      <path d="M8.25 4.5L13.75 10l-5.5 5.5" />
                    </svg>
                  </button>
                </div>
              </div>
              <button id="copyValueBtn" class="ghost toolbar-action-btn">复制值</button>
              <button id="fullscreenBtn" class="ghost toolbar-action-btn">全屏</button>
              <button id="fullscreenCloseBtn" class="ghost toolbar-action-btn fullscreen-close-btn">退出</button>
            </div>
          </div>
          <div id="treeView" class="tree-view empty">粘贴后会自动解析并显示在这里</div>
        </div>
      </div>
    </section>
  </main>

  <div id="fullscreenBackdrop" class="fullscreen-backdrop"></div>
  <div id="fullscreenHost" class="fullscreen-host"></div>
  <div id="contextMenu" class="context-menu hidden">
    <button id="contextCopyPathBtn" class="context-menu-btn">复制路径</button>
    <button id="contextCopyValueBtn" class="context-menu-btn">复制值</button>
    <button id="contextCopyNodeBtn" class="context-menu-btn">复制节点</button>
    <button id="contextUnescapeBtn" class="context-menu-btn">处理输入内容</button>
    <button id="contextCompactBtn" class="context-menu-btn">压缩内容</button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
